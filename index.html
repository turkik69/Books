<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>ورّاق — منصة بيع الكتب المستعملة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Amiri:wght@400;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body, #root { height: 100%; }
  body { margin: 0; font-family: 'Noto Naskh Arabic', serif; background:#F7F1E3; }
  .disp { font-family: 'Tajawal', sans-serif; }
  .lit { font-family: 'Amiri', serif; }
  .scrollbar-none::-webkit-scrollbar { display: none; }

  @keyframes fadeIn { from { opacity:0; transform: translate(-50%,-10px);} to { opacity:1; transform: translate(-50%,0);} }
  @keyframes riseIn { from { opacity:0; transform: translateY(14px);} to { opacity:1; transform: translateY(0);} }
  @keyframes popIn { from { opacity:0; transform: scale(.92);} to { opacity:1; transform: scale(1);} }
  @keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }
  @keyframes glowPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(184,134,59,0.35);} 50% { box-shadow: 0 0 0 8px rgba(184,134,59,0);} }

  .rise { animation: riseIn .45s cubic-bezier(.16,1,.3,1) both; }
  .pop { animation: popIn .3s cubic-bezier(.34,1.56,.64,1) both; }

  .paper-texture {
    background-image:
      radial-gradient(circle at 20% 30%, rgba(184,134,59,0.035) 0%, transparent 45%),
      radial-gradient(circle at 80% 70%, rgba(15,61,50,0.03) 0%, transparent 50%);
  }

  .shadow-paper { box-shadow: 0 1px 2px rgba(36,31,26,0.06), 0 8px 24px -6px rgba(36,31,26,0.14), 0 2px 6px -2px rgba(184,134,59,0.08); }
  .shadow-paper-lg { box-shadow: 0 4px 10px rgba(36,31,26,0.08), 0 20px 44px -12px rgba(36,31,26,0.22), 0 6px 16px -4px rgba(184,134,59,0.1); }
  .shadow-inset-brass { box-shadow: inset 0 0 0 1.5px rgba(184,134,59,0.28); }

  .seal {
    position: relative;
    display: inline-flex; align-items: center; gap: 6px;
    border-radius: 999px;
    font-family: 'Tajawal', sans-serif; font-weight: 800; font-size: 11px;
    letter-spacing: .02em;
    padding: 5px 12px 5px 10px;
  }
  .seal::before {
    content: ''; position: absolute; inset: 0; border-radius: 999px;
    background: radial-gradient(ellipse at 30% 25%, rgba(255,255,255,0.35), transparent 60%);
    pointer-events: none;
  }

  .menu-pop { animation: popIn .18s cubic-bezier(.34,1.56,.64,1) both; transform-origin: top left; }

  .chat-scroll::-webkit-scrollbar { width: 4px; }
  .chat-scroll::-webkit-scrollbar-thumb { background: rgba(184,134,59,0.25); border-radius: 4px; }

  .skeleton {
    background: linear-gradient(90deg, #EFE6D0 25%, #F5EFDD 37%, #EFE6D0 63%);
    background-size: 400px 100%;
    animation: shimmer 1.4s ease-in-out infinite;
  }

  #boot { position:fixed; inset:0; background:#F7F1E3; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; z-index:9999; }
  #boot .logo { font-family:'Amiri',serif; font-weight:700; font-size:32px; color:#0F3D32; letter-spacing:.02em; }
  #boot .ring { width:34px; height:34px; border-radius:50%; border: 3px solid rgba(184,134,59,0.2); border-top-color:#B8863B; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="boot"><div class="logo">ورّاق</div><div class="ring"></div></div>
<div id="root"></div>
